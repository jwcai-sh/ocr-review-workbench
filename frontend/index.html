<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Review Workbench</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1ea;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --border: #d5dccd;
      --border-strong: #c7cfbe;
      --text: #162014;
      --muted: #6a7468;
      --accent: #5aa440;
      --accent-strong: #3f7b2b;
      --selection: linear-gradient(180deg, #76bb58 0%, #5ea53e 100%);
      --selection-text: #f5fff2;
      --shadow: 0 14px 36px rgba(43, 66, 37, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(142, 184, 125, 0.16), transparent 36%),
        linear-gradient(180deg, #f3f5ef 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    }

    main {
      width: min(1380px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 14px;
    }

    .topbar-title {
      min-width: 280px;
    }

    .topbar-user {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.1;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar select {
      min-width: 320px;
    }

    .user-menu {
      position: relative;
    }

    .user-menu-trigger {
      min-width: 118px;
      border-radius: 999px;
      font-weight: 680;
    }

    .user-menu-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 30;
      display: none;
      width: 300px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow);
    }

    .user-menu.is-open .user-menu-panel {
      display: block;
    }

    .login-form {
      display: grid;
      gap: 8px;
    }

    .login-form .pill,
    .login-form input,
    .login-form button {
      width: 100%;
    }

    .login-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button,
    select,
    input {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font: inherit;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent-strong);
      background: var(--selection);
      color: var(--selection-text);
      font-weight: 680;
    }

    button:disabled,
    select:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    select,
    input {
      padding: 0 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 13px;
    }

    .admin-badge {
      min-height: 30px;
      font-size: 12px;
    }

    .status {
      min-height: 20px;
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .sync-summary {
      display: none;
      min-height: 18px;
      margin: -6px 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .dashboard-overview {
      display: grid;
      grid-template-columns: minmax(250px, 0.85fr) minmax(0, 1.7fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .dashboard-main,
    .metric {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .dashboard-main {
      padding: 8px 12px;
      display: grid;
      align-content: space-between;
      gap: 6px;
    }

    .dashboard-kicker,
    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .dashboard-total {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .dashboard-total strong {
      font-size: 30px;
      line-height: 1;
      font-weight: 780;
    }

    .dashboard-total span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .dashboard-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .progress-track {
      display: flex;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6ebe2;
      border: 1px solid rgba(110, 126, 103, 0.18);
    }

    .progress-segment {
      width: 0%;
      min-width: 0;
      transition: width 180ms ease;
    }

    .progress-segment.done {
      background: #4f9b59;
    }

    .progress-segment.active {
      background: #d39a2e;
    }

    .progress-segment.todo {
      background: #a7b0a1;
    }

    .dashboard-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 70px;
      padding: 8px 12px;
    }

    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.08;
      font-weight: 760;
    }

    .metric.done strong {
      color: #2f7c48;
    }

    .metric.active strong {
      color: #7a5a13;
    }

    .metric.todo strong {
      color: #59645a;
    }

    .bulk-assign-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 13px;
    }

    .bulk-assign-bar .folder-select {
      margin-right: 0;
    }

    .bulk-label {
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .bulk-assign-bar select {
      min-width: 92px;
      height: 30px;
    }

    .bulk-assign-bar button {
      min-height: 30px;
    }

    .explorer {
      display: grid;
      grid-template-columns: 1.1fr 1.1fr 1.35fr;
      min-height: 700px;
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: var(--shadow);
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--panel);
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(247, 249, 244, 0.96);
    }

    .panel-head strong {
      font-size: 14px;
      font-weight: 760;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 10px;
      overflow: auto;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .folder-item,
    .mineru-card {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: inherit;
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
    }

    .folder-select {
      width: 18px;
      height: 18px;
      margin: 0 2px 0 0;
      flex: 0 0 auto;
      accent-color: var(--accent);
    }

    .folder-item:hover,
    .mineru-card:hover {
      background: rgba(102, 151, 77, 0.08);
    }

    .folder-item.is-selected {
      border-color: rgba(63, 123, 43, 0.38);
      background: var(--selection);
      color: var(--selection-text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .folder-icon {
      flex: 0 0 22px;
      width: 22px;
      height: 18px;
      border-radius: 4px;
      background: linear-gradient(180deg, #86d0ff 0%, #4eb2ef 100%);
      position: relative;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    }

    .folder-icon::before {
      content: "";
      position: absolute;
      top: -3px;
      left: 2px;
      width: 10px;
      height: 5px;
      border-radius: 4px 4px 0 0;
      background: #80c9f5;
    }

    .folder-item.is-selected .folder-icon {
      background: linear-gradient(180deg, rgba(223, 245, 214, 0.95) 0%, rgba(196, 236, 178, 0.88) 100%);
    }

    .folder-main {
      min-width: 0;
      flex: 1;
    }

    .folder-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .folder-title {
      display: block;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 650;
    }

    .needs-extra-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 1px 7px;
      border-radius: 999px;
      background: #fff3df;
      color: #a15c00;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .needs-extra-badge.is-empty {
      background: #eef1ed;
      color: #66705f;
      font-weight: 650;
    }

    .folder-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-item.is-selected .folder-meta,
    .folder-item.is-selected .folder-arrow {
      color: rgba(245, 255, 242, 0.86);
    }

    .folder-arrow {
      color: #95a08d;
      font-size: 18px;
      line-height: 1;
    }

    .mineru-card {
      padding: 12px;
      border-color: var(--border);
      background: var(--panel-strong);
    }

    .mineru-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mineru-top strong {
      display: block;
      font-size: 14px;
      font-weight: 740;
    }

    .mineru-top span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 9px;
      border-radius: 999px;
      background: #eef1ed;
      color: #39443a;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .badge.warn {
      background: #fff3df;
      color: #a15c00;
    }

    .badge.ok {
      background: #e6f4e9;
      color: #2f7c48;
    }

    .mineru-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .review-field {
      display: grid;
      gap: 4px;
    }

    .review-status {
      display: grid;
      gap: 4px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
    }

    .review-status strong {
      color: var(--ink);
      font-size: 14px;
    }

    .mineru-grid label {
      color: var(--muted);
      font-size: 12px;
    }

    .mineru-grid select,
    .mineru-grid button {
      width: 100%;
    }

    .mineru-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .mineru-actions button,
    .mineru-actions .link-button {
      min-height: 36px;
      height: auto;
      line-height: 1.25;
      white-space: normal;
    }

    .mineru-actions .wide-action {
      grid-column: 1 / -1;
    }

    .stage-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .stage-actions-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .stage-actions button {
      width: 100%;
      min-height: 34px;
      height: auto;
      white-space: normal;
      line-height: 1.25;
      background: #fff;
      color: #506348;
    }

    .stage-actions button:not(:disabled) {
      border-color: rgba(161, 92, 0, 0.28);
      color: #8b5e00;
      background: #fffaf0;
    }

    .folder-summary-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .folder-summary-row strong {
      color: var(--ink);
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--accent-strong);
      font-weight: 680;
      text-decoration: none;
    }

    .empty {
      padding: 24px 14px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .topbar-user {
        align-items: flex-start;
      }

      .user-menu-panel {
        left: 0;
        right: auto;
      }

      .toolbar select {
        min-width: min(100%, 320px);
      }

      .dashboard-overview,
      .explorer {
        grid-template-columns: 1fr;
      }

      .panel + .panel {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="topbar">
      <div class="topbar-title">
        <h1>OCR 校对书库</h1>
      </div>
      <div class="topbar-user" aria-label="用户登录状态">
        <div id="userMenu" class="user-menu">
          <button id="userMenuButton" class="user-menu-trigger" type="button" aria-expanded="false" aria-haspopup="true">用户</button>
          <div class="user-menu-panel">
            <form id="loginForm" class="login-form" autocomplete="off">
              <label class="pill" for="currentUserSelect">用户
                <select id="currentUserSelect" aria-label="当前用户"></select>
              </label>
              <input id="loginPasswordInput" type="password" placeholder="登录口令" autocomplete="current-password">
              <div class="login-actions">
                <button id="loginButton" type="submit">登录</button>
                <button id="logoutButton" type="button" disabled>退出</button>
              </div>
            </form>
          </div>
        </div>
        <span id="adminBadge" class="pill admin-badge">请先登录</span>
      </div>
    </section>

    <section class="toolbar" aria-label="书库操作">
      <select id="syncCategorySelect" aria-label="选择要同步的 OSS 分类">
        <option value="">分类</option>
      </select>
      <button id="syncOssButton" class="primary" type="button">同步所选分类</button>
      <button id="syncAllCategoriesButton" type="button">一键同步所有分类</button>
      <select id="ownerFilterSelect" aria-label="按分配人筛选">
        <option value="all">全部</option>
        <option value="mine">只看我的</option>
        <option value="unassigned">未分配</option>
      </select>
      <input id="searchInput" type="search" placeholder="搜索分类、书名、文件夹">
      <button id="reloadButton" type="button">刷新列表</button>
    </section>

    <p id="syncSummaryLine" class="sync-summary">请选择分类后同步。已入库书籍会直接从数据库加载。</p>
    <p id="statusLine" class="status">正在加载书籍列表...</p>

    <section class="dashboard-overview" aria-label="书库仪表盘总览">
      <div class="dashboard-main">
        <div>
          <div class="dashboard-kicker">书库总览</div>
          <div class="dashboard-total">
            <strong id="totalBookCount">0</strong>
            <span>本书</span>
          </div>
          <div id="totalBookLabel" class="dashboard-meta">0 条记录 / 0 个分类</div>
        </div>
        <div>
          <div id="completionRateLabel" class="dashboard-meta">完成率 0%</div>
          <div class="progress-track" aria-label="校对状态分布">
            <span id="completedProgress" class="progress-segment done"></span>
            <span id="activeProgress" class="progress-segment active"></span>
            <span id="unreviewedProgress" class="progress-segment todo"></span>
          </div>
        </div>
      </div>
      <div class="dashboard-metrics">
        <div class="metric done"><strong id="completedBookCount">0</strong><span>校对完成</span></div>
        <div class="metric active"><strong id="activeBookCount">0</strong><span>正在校对</span></div>
        <div class="metric todo"><strong id="unreviewedBookCount">0</strong><span>未校对</span></div>
      </div>
    </section>

    <section class="explorer" aria-label="书籍层级浏览">
      <section class="panel">
        <div class="panel-head">
          <strong>分类</strong>
          <span id="categorySummary">0 个分类</span>
        </div>
        <div class="panel-body">
          <div id="categoryList" class="item-list"></div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <strong>书名</strong>
          <span id="bookSummary">0 本书</span>
        </div>
        <div class="panel-body">
          <div id="bookList" class="item-list"></div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <strong>MinerU 识别文件夹</strong>
          <span id="folderSummary">0 个文件夹</span>
        </div>
        <div class="panel-body">
          <div id="folderList" class="item-list"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const PARTICIPANTS = ["傲", "门", "白", "丹"];
    const state = {
      books: [],
      selectedCategoryKey: "",
      selectedBookKey: "",
      currentUser: "门",
      authenticated: false,
      ownerFilter: "all",
      users: PARTICIPANTS.map((name) => ({ id: name, name })),
      adminUserId: "门",
      adminUserIds: ["门"],
      ossCategories: [],
      syncRuns: [],
      ossOverview: [],
      savingFolderKeys: new Set(),
      selectedBookKeys: new Set(),
      bulkAssignee: "",
      bulkAssignStage: "first",
      savingBulkAssignment: false,
    };
    const els = {};

    document.addEventListener("DOMContentLoaded", () => {
      [
        "syncOssButton",
        "syncAllCategoriesButton",
        "reloadButton",
        "syncCategorySelect",
        "ownerFilterSelect",
        "searchInput",
        "userMenu",
        "userMenuButton",
        "loginForm",
        "currentUserSelect",
        "loginPasswordInput",
        "loginButton",
        "logoutButton",
        "adminBadge",
        "syncSummaryLine",
        "statusLine",
        "totalBookCount",
        "totalBookLabel",
        "completionRateLabel",
        "completedProgress",
        "activeProgress",
        "unreviewedProgress",
        "completedBookCount",
        "activeBookCount",
        "unreviewedBookCount",
        "categorySummary",
        "bookSummary",
        "folderSummary",
        "categoryList",
        "bookList",
        "folderList",
      ].forEach((id) => {
        els[id] = document.getElementById(id);
      });
      els.syncOssButton.addEventListener("click", syncOssBooks);
      els.syncAllCategoriesButton.addEventListener("click", syncAllCategories);
      els.reloadButton.addEventListener("click", loadBooks);
      els.userMenuButton.addEventListener("click", toggleUserMenu);
      document.addEventListener("click", closeUserMenuOnOutsideClick);
      els.syncCategorySelect.addEventListener("change", updateSyncSummary);
      els.ownerFilterSelect.addEventListener("change", () => {
        state.ownerFilter = String(els.ownerFilterSelect.value || "all");
        renderExplorer();
      });
      els.searchInput.addEventListener("input", renderExplorer);
      els.loginForm.addEventListener("submit", handleLoginSubmit);
      els.logoutButton.addEventListener("click", logout);
      els.currentUserSelect.addEventListener("change", updateAdminBadge);
      els.categoryList.addEventListener("click", handleCategoryClick);
      els.bookList.addEventListener("click", handleBookClick);
      els.folderList.addEventListener("click", handleFolderClick);
      initAuth().finally(() => {
        loadOssCategories();
        loadBooks().finally(() => loadOssOverview({ silent: true }));
      });
    });

    function toggleUserMenu(event) {
      event.stopPropagation();
      const isOpen = !els.userMenu.classList.contains("is-open");
      els.userMenu.classList.toggle("is-open", isOpen);
      els.userMenuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
    }

    function closeUserMenuOnOutsideClick(event) {
      if (!els.userMenu || els.userMenu.contains(event.target)) {
        return;
      }
      els.userMenu.classList.remove("is-open");
      els.userMenuButton.setAttribute("aria-expanded", "false");
    }

    async function initAuth() {
      try {
        const response = await fetch("/api/auth/me", { cache: "no-store", credentials: "include" });
        const data = await response.json();
        applyAuthState(data);
      } catch {
        applyAuthState({ authenticated: false, users: state.users, adminUserId: state.adminUserId });
      }
    }

    async function handleLoginSubmit(event) {
      event.preventDefault();
      const userId = String(els.currentUserSelect.value || "").trim();
      const password = String(els.loginPasswordInput.value || "");
      if (!userId || !password) {
        setStatus("请选择用户并输入登录口令", true);
        return;
      }
      setBusy(true, "正在登录...");
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, password }),
        });
        const data = await response.json();
        if (!data.ok) {
          throw new Error(data.error || "登录失败");
        }
        els.loginPasswordInput.value = "";
        applyAuthState(data);
        setStatus(`已登录：${state.currentUser}`);
        renderExplorer();
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        setBusy(false);
      }
    }

    async function logout() {
      setBusy(true, "正在退出...");
      try {
        const response = await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
        const data = await response.json();
        applyAuthState(data);
        setStatus("已退出");
        renderExplorer();
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        setBusy(false);
      }
    }

    function applyAuthState(data) {
      const users = Array.isArray(data?.users) && data.users.length ? data.users : state.users;
      state.users = users.map((user) => ({ id: String(user.id || user.name || ""), name: String(user.name || user.id || "") })).filter((user) => user.id);
      state.adminUserId = String(data?.adminUserId || "门");
      const adminIds = Array.isArray(data?.adminUserIds) && data.adminUserIds.length ? data.adminUserIds : [state.adminUserId];
      state.adminUserIds = adminIds.map((userId) => String(userId || "").trim()).filter(Boolean);
      state.authenticated = Boolean(data?.authenticated && data?.user?.id);
      state.currentUser = state.authenticated ? String(data.user.id) : state.adminUserId;
      if (state.authenticated && state.ownerFilter === "all" && state.currentUser !== state.adminUserId) {
        state.ownerFilter = "mine";
      }
      renderUserOptions();
      renderOwnerFilterOptions();
      updateAdminBadge();
    }

    function renderUserOptions() {
      const selected = state.authenticated ? state.currentUser : String(els.currentUserSelect?.value || state.adminUserId);
      els.currentUserSelect.innerHTML = state.users.map((user) => {
        const label = user.name || user.id;
        return `<option value="${escapeHtml(user.id)}" ${user.id === selected ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
      els.currentUserSelect.disabled = state.authenticated;
      els.loginPasswordInput.disabled = state.authenticated;
      els.loginButton.disabled = state.authenticated;
      els.logoutButton.disabled = !state.authenticated;
      els.userMenuButton.textContent = state.authenticated ? state.currentUser : "登录";
    }

    function renderOwnerFilterOptions() {
      if (!els.ownerFilterSelect) {
        return;
      }
      if (state.authenticated && state.ownerFilter === `owner:${state.currentUser}`) {
        state.ownerFilter = "mine";
      }
      const participantOptions = PARTICIPANTS
        .filter((name) => !(state.authenticated && name === state.currentUser))
        .map((name) => ({ value: `owner:${name}`, label: `筛选：${name}` }));
      const options = [
        { value: "all", label: "筛选：全部" },
        { value: "mine", label: state.authenticated ? `筛选：我的（${state.currentUser}）` : "筛选：只看我的" },
        { value: "unassigned", label: "筛选：未分配" },
      ].concat(participantOptions);
      els.ownerFilterSelect.innerHTML = options.map((option) => `
        <option value="${escapeHtml(option.value)}" ${state.ownerFilter === option.value ? "selected" : ""}>${escapeHtml(option.label)}</option>
      `).join("");
      els.ownerFilterSelect.value = options.some((option) => option.value === state.ownerFilter) ? state.ownerFilter : "all";
    }

    function updateAdminBadge() {
      const isAdmin = canAssign();
      if (els.syncAllCategoriesButton) {
        els.syncAllCategoriesButton.disabled = !isAdmin;
      }
      if (!state.authenticated) {
        els.adminBadge.textContent = "未登录，只可浏览";
        els.adminBadge.style.color = "#8b6d12";
        return;
      }
      els.adminBadge.textContent = isAdmin ? `当前为管理员“${state.currentUser}”，可分配并校对全部书` : `当前为“${state.currentUser}”，不可分配`;
      els.adminBadge.style.color = isAdmin ? "#2f7c48" : "#8b6d12";
    }

    function canAssign() {
      const adminIds = Array.isArray(state.adminUserIds) && state.adminUserIds.length ? state.adminUserIds : [state.adminUserId];
      return state.authenticated && adminIds.map((userId) => String(userId || "").trim()).includes(state.currentUser);
    }

    async function loadBooks() {
      setBusy(true, "正在加载书籍列表...");
      try {
        const response = await fetch("/api/books?limit=5000", { cache: "no-store", credentials: "include" });
        const data = await readJsonResponse(response, "书籍列表读取失败");
        if (!data.ok) {
          throw new Error(data.error || "书籍列表读取失败");
        }
        state.books = Array.isArray(data.books) ? data.books : [];
        state.syncRuns = Array.isArray(data.syncRuns) ? data.syncRuns : [];
        ensureSelection();
        setStatus(`已加载 ${state.books.length} 条书籍记录`);
        renderExplorer();
      } catch (error) {
        state.books = [];
        state.syncRuns = [];
        renderExplorer();
        setStatus(error.message || String(error), true);
      } finally {
        setBusy(false);
      }
    }

    async function loadOssCategories() {
      try {
        const response = await fetch("/api/oss/categories", { cache: "no-store", credentials: "include" });
        const data = await readJsonResponse(response, "OSS 分类读取失败");
        state.ossCategories = Array.isArray(data.categories) ? data.categories : [];
        renderSyncCategoryOptions(buildHierarchy(state.books).categories);
      } catch (error) {
        state.ossCategories = [];
        renderSyncCategoryOptions(buildHierarchy(state.books).categories);
      }
    }

    async function loadOssOverview(options = {}) {
      const silent = Boolean(options.silent);
      if (!silent) {
        setBusy(true, "正在读取 OSS 分类概览...");
      }
      try {
        const response = await fetch("/api/oss/category-overview", { cache: "no-store", credentials: "include" });
        const data = await readJsonResponse(response, "OSS 分类概览读取失败");
        if (!data.ok) {
          throw new Error(data.error || "OSS 分类概览读取失败");
        }
        state.ossOverview = Array.isArray(data.categories) ? data.categories : [];
        const totalBooks = state.ossOverview.reduce((sum, category) => sum + Number(category.bookCount || 0), 0);
        renderExplorer();
        if (!silent) {
          setStatus(`分类概览已更新：${state.ossOverview.length} 个分类，${totalBooks} 本书。二级概览可直接分配；校对前再同步所选分类入库。`);
        }
        return data;
      } catch (error) {
        if (!silent) {
          setStatus(error.message || String(error), true);
        }
        return { ok: false, error: error.message || String(error) };
      } finally {
        if (!silent) {
          setBusy(false);
        }
      }
    }

    async function syncOssBooks() {
      if (!canAssign()) {
        setStatus(state.authenticated ? "只有管理员可以同步书库" : "请先登录管理员账号", true);
        return;
      }
      const prefix = syncOssPrefix();
      setBusy(true, `正在同步 ${prefix} ...`);
      try {
        const response = await fetch("/api/books/sync-oss", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prefix, limit: 200000 }),
        });
        const data = await readJsonResponse(response, "OSS 同步失败");
        if (!data.ok) {
          throw new Error(data.error || data.dbSync?.error || "OSS 同步失败");
        }
        if (data.jobId) {
          const result = await pollOssSyncJob(data.jobId, { tolerateStatusFailure: true });
          if (result.statusReadFailed) {
            setStatus("分类已启动后台入库，但状态暂时不可读。请稍后点击“刷新列表”查看新增书籍。");
            return;
          }
        } else {
          const changedCount = data.changedKeyCount == null ? data.keyCount || 0 : data.changedKeyCount;
          setStatus(`OSS 同步完成：对象 ${data.keyCount || 0}，变化 ${changedCount}，识别 ${data.booksFound || 0}，入库 ${data.dbSync?.count || 0}`);
        }
        await loadBooks();
      } catch (error) {
        if (isGatewayInterruption(error)) {
          setStatus("OSS 同步请求被 Zeabur 网关中断。若后台已启动，请稍后点“刷新列表”；当前先保留已加载书籍。", true);
          window.setTimeout(() => {
            loadBooks().finally(() => loadOssOverview({ silent: true }));
          }, 1500);
          return;
        }
        setStatus(error.message || String(error), true);
      } finally {
        setBusy(false);
      }
    }

    async function syncAllCategories() {
      if (!canAssign()) {
        setStatus(state.authenticated ? "只有管理员可以同步书库" : "请先登录管理员账号", true);
        return;
      }
      await loadOssOverview();
    }

    async function syncOssPrefixToDb(prefix, options = {}) {
      const response = await fetch("/api/books/sync-oss", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prefix, limit: 200000 }),
      });
      let data = null;
      try {
        data = await readJsonResponse(response, "OSS 同步失败");
      } catch (error) {
        if (isGatewayInterruption(error)) {
          return {
            ok: true,
            status: "unknown",
            statusReadFailed: true,
            error: error.message || String(error),
          };
        }
        throw error;
      }
      if (!data.ok) {
        throw new Error(data.error || data.dbSync?.error || "OSS 同步失败");
      }
      if (data.jobId) {
        return pollOssSyncJob(data.jobId, options);
      }
      return data;
    }

    function syncOssPrefix() {
      const rawCategory = String(els.syncCategorySelect?.value || "");
      if (!rawCategory) {
        return "books-raw/";
      }
      return normalizedOssPrefix(rawCategory);
    }

    function normalizedOssPrefix(rawPrefix) {
      const rawCategory = String(rawPrefix || "");
      if (!rawCategory) {
        return "books-raw/";
      }
      const normalized = rawCategory.replace(/^\/+|\/+$/g, "");
      if (normalized.startsWith("books-raw/")) {
        return normalized.endsWith("/") ? normalized : `${normalized}/`;
      }
      return `books-raw/${normalized}/`;
    }

    async function pollOssSyncJob(jobId, options = {}) {
      const startedAt = Date.now();
      let consecutiveReadFailures = 0;
      while (Date.now() - startedAt < 8 * 60 * 1000) {
        await delay(2000);
        let data = null;
        try {
          const response = await fetch(`/api/books/sync-oss/status?jobId=${encodeURIComponent(jobId)}`, {
            cache: "no-store",
            credentials: "include",
          });
          data = await readJsonResponse(response, "OSS 同步状态读取失败");
          consecutiveReadFailures = 0;
        } catch (error) {
          consecutiveReadFailures += 1;
          if (consecutiveReadFailures >= 5) {
            if (options.tolerateStatusFailure) {
              return {
                ok: true,
                status: "unknown",
                statusReadFailed: true,
                error: error.message || String(error),
                jobId,
              };
            }
            throw error;
          }
          setStatus(`OSS 同步状态暂时不可读，正在重试 ${consecutiveReadFailures}/5：${error.message || String(error)}`);
          continue;
        }
        if (!data.ok && data.status !== "failed") {
          throw new Error(data.error || "OSS 同步状态读取失败");
        }
        const progress = `已扫描 ${data.scannedCount || 0}，有效文件 ${data.keyCount || 0}，变化 ${data.changedKeyCount || 0}，识别 ${data.booksFound || 0}，入库 ${data.dbSync?.count || 0}`;
        setStatus(`${data.message || "正在同步 OSS 书籍"}：${progress}`);
        if (data.status === "completed") {
          setStatus(`OSS 同步完成：${progress}`);
          return data;
        }
        if (data.status === "failed") {
          throw new Error(data.error || data.message || data.dbSync?.error || "OSS 同步失败");
        }
      }
      throw new Error("OSS 同步仍在后台执行，请稍后点击刷新列表");
    }

    function renderExplorer() {
      const categories = visibleCategories();
      ensureSelection(categories);
      renderSyncCategoryOptions(buildHierarchy(state.books).categories);
      renderStats(categories);
      updateSyncSummary();
      renderCategories(categories);
      renderBooks(categories);
      renderFolders(categories);
    }

    function renderSyncCategoryOptions(categories) {
      if (!els.syncCategorySelect) {
        return;
      }
      const currentValue = els.syncCategorySelect.value;
      const byValue = new Map();
      const visibleLabels = new Set();
      const addOption = (value, title) => {
        const normalizedValue = String(value || "");
        const label = String(title || "");
        const visibleLabel = syncCategoryLabel(label);
        if (!normalizedValue || !label.trim() || visibleLabels.has(visibleLabel)) {
          return;
        }
        byValue.set(normalizedValue, label);
        visibleLabels.add(visibleLabel);
      };
      state.ossCategories.forEach((category) => {
        addOption(category.prefix, category.title);
      });
      categories.forEach((category) => {
        addOption(category.title, category.title);
      });
      const options = ['<option value="">分类</option>'].concat(
        Array.from(byValue.entries())
          .sort((left, right) => left[1].localeCompare(right[1], "zh-Hans-CN"))
          .map(([value, label]) => `<option value="${escapeHtml(value)}">${escapeHtml(syncCategoryLabel(label))}</option>`),
      );
      els.syncCategorySelect.innerHTML = options.join("");
      if (Array.from(els.syncCategorySelect.options).some((option) => option.value === currentValue)) {
        els.syncCategorySelect.value = currentValue;
      }
    }

    function syncCategoryLabel(title) {
      const value = String(title || "");
      return value.trim() || value;
    }

    function updateSyncSummary() {
      if (!els.syncSummaryLine) {
        return;
      }
      const prefix = syncOssPrefix();
      const run = state.syncRuns.find((item) => String(item.prefix || "") === prefix);
      const label = selectedSyncCategoryLabel();
      if (!run) {
        els.syncSummaryLine.textContent = `${label}：尚无同步记录。已入库书籍仍会直接从数据库加载。`;
        return;
      }
      const finished = formatDateTime(run.completedAt || run.startedAt);
      const changed = Number(run.changedKeyCount || 0);
      const dbCount = Number(run.dbSyncCount || 0);
      const status = run.status === "completed" ? "上次同步完成" : `上次同步${run.status || ""}`;
      els.syncSummaryLine.textContent = `${label}：${status} ${finished}，扫描 ${run.scannedCount || 0}，有效 ${run.keyCount || 0}，变化 ${changed}，入库 ${dbCount}`;
    }

    function selectedSyncCategoryLabel() {
      const select = els.syncCategorySelect;
      if (!select || !select.selectedOptions || !select.selectedOptions.length) {
        return "分类";
      }
      return select.selectedOptions[0].textContent || "分类";
    }

    function formatDateTime(value) {
      if (!value) {
        return "时间未知";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function visibleCategories() {
      return filterCategories(mergeOssOverviewCategories(buildHierarchy(state.books).categories));
    }

    function filterCategories(categories) {
      return categories.map((category) => {
        const books = category.books.filter((book) => bookPassesFilters(book));
        return { ...category, books };
      }).filter((category) => category.books.length);
    }

    function bookPassesFilters(book) {
      const ownerFilter = String(state.ownerFilter || "all");
      const assignees = bookAssignees(book);
      if (ownerFilter === "mine" && !assignees.includes(state.currentUser)) {
        return false;
      }
      if (ownerFilter === "unassigned" && assignees.length) {
        return false;
      }
      if (ownerFilter.startsWith("owner:") && !assignees.includes(ownerFilter.slice("owner:".length))) {
        return false;
      }
      const keyword = normalize(els.searchInput.value);
      return !keyword || normalize(bookSearchText(book)).includes(keyword);
    }

    function bookSearchText(book) {
      const records = bookRecords(book);
      return [
        book.title,
        book.metaPath,
        book.owner_user_id,
        book.first_reviewer_id,
        book.second_reviewer_id,
        ...records.flatMap((record) => [
          record.title,
          record.chunk_label,
          record.oss_middle_key,
          record.owner_user_id,
          record.first_reviewer_id,
          record.second_reviewer_id,
        ]),
      ].join(" ");
    }

    function bookRecords(book) {
      return (Array.isArray(book.folders) ? book.folders : []).flatMap((folder) => Array.isArray(folder.records) ? folder.records : []);
    }

    function bookAssignees(book) {
      const values = [
        book.owner_user_id,
        book.first_reviewer_id,
        book.second_reviewer_id,
      ];
      bookRecords(book).forEach((record) => {
        values.push(record.owner_user_id, record.first_reviewer_id, record.second_reviewer_id);
      });
      return Array.from(new Set(values.map((value) => String(value || "").trim()).filter(Boolean)));
    }

    function buildHierarchy(books) {
      const categoriesByKey = new Map();
      books.forEach((book) => {
        const location = deriveBookLocation(book);
        let category = categoriesByKey.get(location.categoryKey);
        if (!category) {
          category = { key: location.categoryKey, title: location.categoryTitle, books: [] };
          categoriesByKey.set(location.categoryKey, category);
        }
        let bookGroup = category.books.find((item) => item.key === location.bookKey);
        if (!bookGroup) {
          bookGroup = { key: location.bookKey, title: location.bookTitle, folders: [], metaPath: location.bookPath };
          category.books.push(bookGroup);
        }
        let folderGroup = bookGroup.folders.find((item) => item.key === location.folderKey);
        if (!folderGroup) {
          folderGroup = {
            key: location.folderKey,
            title: location.folderTitle,
            pathLabel: location.folderPathLabel,
            records: [],
          };
          bookGroup.folders.push(folderGroup);
        }
        folderGroup.records.push(book);
      });
      const categories = Array.from(categoriesByKey.values()).sort((a, b) => a.title.localeCompare(b.title, "zh-Hans-CN"));
      categories.forEach((category) => {
        category.books.sort((a, b) => a.title.localeCompare(b.title, "zh-Hans-CN"));
        category.books.forEach((book) => {
          book.folders.sort((a, b) => a.title.localeCompare(b.title, "zh-Hans-CN"));
        });
      });
      return { categories };
    }

    function mergeOssOverviewCategories(categories) {
      const merged = categories.map((category) => ({ ...category, books: category.books.slice() }));
      const byTitle = new Map(merged.map((category) => [String(category.title || ""), category]));
      (Array.isArray(state.ossOverview) ? state.ossOverview : []).forEach((overview) => {
        const title = String(overview.title || "").trim() || String(overview.title || "");
        if (!title) {
          return;
        }
        let category = byTitle.get(title);
        if (!category) {
          category = { key: title, title, books: [], fromOssOverview: true };
          byTitle.set(title, category);
          merged.push(category);
        }
        const existingBooks = new Set(category.books.map((book) => String(book.title || "")));
        (Array.isArray(overview.books) ? overview.books : []).forEach((book) => {
          const bookTitle = String(book.title || "").trim() || String(book.title || "");
          const owner = String(book.owner_user_id || book.first_reviewer_id || "").trim();
          const firstReviewer = String(book.first_reviewer_id || owner).trim();
          const secondReviewer = String(book.second_reviewer_id || "").trim();
          if (!bookTitle) {
            return;
          }
          if (existingBooks.has(bookTitle)) {
            const existingBook = category.books.find((item) => String(item.title || "") === bookTitle);
            mergeOverviewAssignmentIntoBook(existingBook, { owner, firstReviewer, secondReviewer });
            return;
          }
          category.books.push({
            key: `${title}::${bookTitle}`,
            title: bookTitle,
            folders: [],
            metaPath: "OSS 分类概览，待同步入库",
            fromOssOverview: true,
            categoryTitle: title,
            bookPrefix: String(book.prefix || ""),
            owner_user_id: owner,
            first_reviewer_id: firstReviewer,
            second_reviewer_id: secondReviewer,
          });
          existingBooks.add(bookTitle);
        });
        category.books.sort((a, b) => a.title.localeCompare(b.title, "zh-Hans-CN"));
      });
      return merged.sort((a, b) => a.title.localeCompare(b.title, "zh-Hans-CN"));
    }

    function mergeOverviewAssignmentIntoBook(book, assignment) {
      if (!book) {
        return;
      }
      const owner = String(assignment?.owner || "").trim();
      const firstReviewer = String(assignment?.firstReviewer || owner || "").trim();
      const secondReviewer = String(assignment?.secondReviewer || "").trim();
      if (!owner && !firstReviewer && !secondReviewer) {
        return;
      }
      book.owner_user_id = secondReviewer || owner || firstReviewer || String(book.owner_user_id || "").trim();
      book.first_reviewer_id = firstReviewer || String(book.first_reviewer_id || "").trim();
      book.second_reviewer_id = secondReviewer || String(book.second_reviewer_id || "").trim();
    }

    function deriveBookLocation(book) {
      const path = String(book.oss_middle_key || book.oss_pdf_key || book.id || "").replace(/\\/g, "/");
      const parts = path.split("/").filter(Boolean);
      const rootIndex = parts[0] === "books-raw" ? 1 : 0;
      const categoryTitle = parts[rootIndex] || "未分类";
      const categoryKey = categoryTitle;
      const folderTitle = inferMineruFolderTitle(parts, book);
      const bookTitle = inferHierarchyBookTitle(parts, book, rootIndex);
      return {
        categoryKey,
        categoryTitle,
        bookKey: `${categoryKey}::${bookTitle}`,
        bookTitle,
        bookPath: parts.slice(rootIndex, Math.max(rootIndex + 2, parts.length - 2)).join(" / "),
        folderKey: `${categoryKey}::${bookTitle}::${folderTitle}`,
        folderTitle,
        folderPathLabel: inferFolderPathLabel(parts, folderTitle),
      };
    }

    function inferHierarchyBookTitle(parts, book, rootIndex) {
      if (book.mode === "chunk") {
        return String(book.title || parts[rootIndex + 1] || "未命名书籍").trim();
      }
      return String(parts[rootIndex + 1] || book.title || "未命名书籍").replace(/_解析结果$/, "").trim();
    }

    function inferMineruFolderTitle(parts, book) {
      if (book.mode === "chunk") {
        const chunkIndex = parts.indexOf("chunks");
        if (chunkIndex >= 0) {
          return "chunks";
        }
        const mergedIndex = parts.indexOf("merged");
        if (mergedIndex >= 0) {
          return "merged";
        }
      }
      return parts[parts.length - 2] || String(book.mode || "folder");
    }

    function inferFolderPathLabel(parts, folderTitle) {
      const folderIndex = parts.lastIndexOf(folderTitle);
      if (folderIndex < 0) {
        return folderTitle;
      }
      return parts.slice(folderIndex).join(" / ");
    }

    function ensureSelection(categories = visibleCategories()) {
      if (!categories.length) {
        state.selectedCategoryKey = "";
        state.selectedBookKey = "";
        return;
      }
      if (!categories.some((category) => category.key === state.selectedCategoryKey)) {
        state.selectedCategoryKey = categories[0].key;
      }
      const category = categories.find((item) => item.key === state.selectedCategoryKey) || categories[0];
      if (!category.books.some((book) => book.key === state.selectedBookKey)) {
        state.selectedBookKey = category.books[0]?.key || "";
      }
    }

    function renderStats(categories) {
      const overview = summarizeBookOverview(categories);
      els.totalBookCount.textContent = String(overview.total);
      els.totalBookLabel.textContent = `${overview.recordCount} 条记录 / ${overview.categoryCount} 个分类`;
      const completedRate = overview.total ? Math.round((overview.completed / overview.total) * 100) : 0;
      const startedRate = overview.total ? Math.round(((overview.completed + overview.active) / overview.total) * 100) : 0;
      els.completionRateLabel.textContent = `校对进度 ${startedRate}% · 完成 ${completedRate}%`;
      setProgressSegment(els.completedProgress, overview.completed, overview.total);
      setProgressSegment(els.activeProgress, overview.active, overview.total);
      setProgressSegment(els.unreviewedProgress, overview.unreviewed, overview.total);
      els.completedBookCount.textContent = String(overview.completed);
      els.activeBookCount.textContent = String(overview.active);
      els.unreviewedBookCount.textContent = String(overview.unreviewed);
      els.categorySummary.textContent = `${categories.length} 个分类`;
      const currentCategory = categories.find((item) => item.key === state.selectedCategoryKey);
      els.bookSummary.textContent = `${currentCategory?.books.length || 0} 本书`;
      const currentBook = currentCategory?.books.find((item) => item.key === state.selectedBookKey);
      els.folderSummary.textContent = `${currentBook?.folders.length || 0} 个文件夹`;
    }

    function summarizeBookOverview(categories) {
      const overview = {
        total: 0,
        completed: 0,
        active: 0,
        unreviewed: 0,
        categoryCount: categories.length,
        recordCount: 0,
      };
      categories.forEach((category) => {
        category.books.forEach((book) => {
          overview.total += 1;
          const records = book.folders.flatMap((folder) => folder.records);
          overview.recordCount += records.length;
          const summary = summarizeBookStatus(records);
          if (summary === "completed") {
            overview.completed += 1;
          } else if (summary === "unreviewed") {
            overview.unreviewed += 1;
          } else {
            overview.active += 1;
          }
        });
      });
      return overview;
    }

    function setProgressSegment(element, count, total) {
      if (!element) {
        return;
      }
      const percent = total ? (Number(count || 0) / total) * 100 : 0;
      element.style.width = `${percent}%`;
      element.title = `${count} / ${total}`;
    }

    function summarizeBookStatus(records) {
      const statuses = records.map((record) => String(record.status || "unreviewed").trim() || "unreviewed");
      if (!statuses.length || statuses.every((status) => status === "unreviewed")) {
        return "unreviewed";
      }
      if (statuses.every((status) => status === "completed")) {
        return "completed";
      }
      return "active";
    }

    function renderCategories(categories) {
      if (!categories.length) {
        els.categoryList.innerHTML = '<div class="empty">没有可展示的分类。</div>';
        return;
      }
      els.categoryList.innerHTML = categories.map((category) => `
        <button class="folder-item ${category.key === state.selectedCategoryKey ? "is-selected" : ""}" type="button" data-category-key="${escapeHtml(category.key)}">
          <span class="folder-icon" aria-hidden="true"></span>
          <span class="folder-main">
            <span class="folder-title">${escapeHtml(category.title)}</span>
            <span class="folder-meta">${escapeHtml(String(category.books.length))} 本书</span>
          </span>
          <span class="folder-arrow" aria-hidden="true">›</span>
        </button>
      `).join("");
    }

    function renderBooks(categories) {
      const category = categories.find((item) => item.key === state.selectedCategoryKey);
      if (!category || !category.books.length) {
        els.bookList.innerHTML = '<div class="empty">先选择左侧分类。</div>';
        return;
      }
      els.bookList.innerHTML = `${renderBulkAssignBar(category.books)}${category.books.map((book) => `
        <button class="folder-item ${book.key === state.selectedBookKey ? "is-selected" : ""}" type="button" data-book-key="${escapeHtml(book.key)}">
          <input class="folder-select" type="checkbox" data-book-select="${escapeHtml(book.key)}" ${state.selectedBookKeys.has(book.key) ? "checked" : ""} aria-label="选择 ${escapeHtml(book.title)}">
          <span class="folder-icon" aria-hidden="true"></span>
          <span class="folder-main">
            <span class="folder-heading">
              <span class="folder-title">${escapeHtml(book.title)}</span>
              ${renderNeedsExtraBadge(bookNeedsExtraCorrectionCount(book), book.fromOssOverview)}
            </span>
            <span class="folder-meta">${escapeHtml(bookMetaLabel(book))}</span>
          </span>
          <span class="folder-arrow" aria-hidden="true">›</span>
        </button>
      `).join("")}`;
    }

    function bookMetaLabel(book) {
      const parts = [book.metaPath || ""];
      if (book.fromOssOverview) {
        parts.push("需校正：待入库");
      } else {
        parts.push("需校正见右侧入口");
      }
      return parts.filter(Boolean).join(" / ");
    }

    function renderNeedsExtraBadge(count, pending) {
      if (pending) {
        return '<span class="needs-extra-badge is-empty">需校正待入库</span>';
      }
      const value = Number(count || 0);
      const emptyClass = value ? "" : " is-empty";
      return `<span class="needs-extra-badge${emptyClass}">需校正 ${escapeHtml(String(value))}</span>`;
    }

    function bookNeedsExtraCorrectionCount(book) {
      return (Array.isArray(book.folders) ? book.folders : []).reduce((sum, folder) => {
        return sum + (Array.isArray(folder.records) ? folder.records : []).reduce((recordSum, record) => {
          return recordSum + Number(record.needs_extra_correction_count || 0);
        }, 0);
      }, 0);
    }

    function renderBulkAssignBar(books) {
      const availableKeys = new Set(books.map((book) => book.key));
      state.selectedBookKeys = new Set(Array.from(state.selectedBookKeys).filter((key) => availableKeys.has(key)));
      const selectedCount = state.selectedBookKeys.size;
      const allSelected = Boolean(books.length) && books.every((book) => state.selectedBookKeys.has(book.key));
      return `
        <div class="bulk-assign-bar">
          <input class="folder-select" type="checkbox" data-select-all-books ${allSelected ? "checked" : ""} ${books.length ? "" : "disabled"} aria-label="全选当前书名列表">
          <span>已选 ${selectedCount} 本</span>
          <span class="bulk-label">分配</span>
          <select data-bulk-stage ${canAssign() ? "" : "disabled"} aria-label="选择分配阶段">
            <option value="first" ${state.bulkAssignStage === "first" ? "selected" : ""}>一校</option>
            <option value="second" ${state.bulkAssignStage === "second" ? "selected" : ""}>二校</option>
          </select>
          <select data-bulk-assignee ${canAssign() ? "" : "disabled"}>
            ${participantOptions(state.bulkAssignee)}
          </select>
          <button class="primary" type="button" data-bulk-assign ${canAssign() && selectedCount && !state.savingBulkAssignment ? "" : "disabled"}>应用分配</button>
        </div>
      `;
    }

    function renderFolders(categories) {
      const category = categories.find((item) => item.key === state.selectedCategoryKey);
      const book = category?.books.find((item) => item.key === state.selectedBookKey);
      if (!book || !book.folders.length) {
        els.folderList.innerHTML = book?.fromOssOverview ? renderOverviewBookAssignmentCard(book) : '<div class="empty">先选择左侧书名。</div>';
        return;
      }
      els.folderList.innerHTML = book.folders.map((folder) => renderFolderCard(folder)).join("");
    }

    function renderOverviewBookAssignmentCard(book) {
      const firstReviewer = String(book.first_reviewer_id || book.owner_user_id || "").trim();
      const secondReviewer = String(book.second_reviewer_id || "").trim();
      return `
        <article class="mineru-card">
          <div class="mineru-top">
            <div>
              <strong>${escapeHtml(book.title)}</strong>
              <span>OSS 两级概览，尚未同步 MinerU 文件夹</span>
            </div>
            <span class="badge">待入库</span>
          </div>
          <div class="mineru-grid">
            <div class="review-grid">
              ${renderReviewerStatus("一校", firstReviewer)}
              ${renderReviewerStatus("二校", secondReviewer)}
            </div>
          </div>
          <div class="mineru-actions">
            <span class="muted-action">校对前再同步所选分类入库</span>
          </div>
        </article>
      `;
    }

    function renderFolderCard(folder) {
      const firstInfo = summarizeReviewer(folder.records, "first_reviewer_id", "owner_user_id");
      const secondInfo = summarizeReviewer(folder.records, "second_reviewer_id");
      const statusInfo = summarizeStatus(folder.records);
      const primaryRecord = folder.records[0] || {};
      const openHref = `./ocr-compare.html?book_id=${encodeURIComponent(String(primaryRecord.id || ""))}`;
      const needsExtraCount = folderNeedsExtraCorrectionCount(folder);
      const needsExtraHref = `${openHref}&review_filter=needs_extra_correction`;
      return `
        <article class="mineru-card">
          <div class="mineru-top">
            <div>
              <strong>${escapeHtml(folder.title)}</strong>
              <span>${escapeHtml(folder.pathLabel)}</span>
            </div>
            <span class="badge ${statusInfo.tone}">${escapeHtml(statusInfo.label)}</span>
          </div>
          <div class="mineru-grid">
            <div class="review-grid">
              ${renderReviewerStatus("一校", firstInfo.label)}
              ${renderReviewerStatus("二校", secondInfo.label)}
            </div>
          </div>
          <div class="folder-summary-row">
            <span>需要额外校正：<strong>${escapeHtml(String(needsExtraCount))}</strong> 个 block</span>
            ${needsExtraCount ? `<a class="link-button" href="${needsExtraHref}">查看需校正</a>` : ""}
          </div>
          <div class="mineru-actions">
            <a class="link-button" href="${openHref}">${folder.records.length > 1 ? `打开首个分块 (${folder.records.length})` : "打开校对"}</a>
          </div>
          <div class="stage-actions">
            <span class="stage-actions-label">阶段管理</span>
            <button type="button" data-folder-second-stage="${escapeHtml(folder.key)}" ${canAssign() && firstInfo.value && statusInfo.value !== "second_review" && statusInfo.value !== "completed" ? "" : "disabled"}>一校完成，进入二校</button>
          </div>
        </article>
      `;
    }

    function folderNeedsExtraCorrectionCount(folder) {
      return (Array.isArray(folder.records) ? folder.records : []).reduce((sum, record) => {
        return sum + Number(record.needs_extra_correction_count || 0);
      }, 0);
    }

    function renderReviewerStatus(label, value) {
      const text = String(value || "").trim() || "未分配";
      return `
        <div class="review-status">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(text)}</strong>
        </div>
      `;
    }

    function participantOptions(current) {
      const options = [''].concat(PARTICIPANTS);
      return options.map((name) => {
        const selected = String(current || "") === String(name || "");
        const label = name || "未分配";
        return `<option value="${escapeHtml(name)}" ${selected ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function summarizeReviewer(records, primaryKey, fallbackKey = "") {
      const values = Array.from(new Set(records.map((record) => {
        return String(record[primaryKey] || (fallbackKey ? record[fallbackKey] : "") || "").trim();
      }).filter(Boolean)));
      if (!values.length) {
        return { value: "", label: "未分配" };
      }
      if (values.length === 1) {
        return { value: values[0], label: values[0] };
      }
      return { value: "", label: `混合分配 (${values.join(" / ")})` };
    }

    function summarizeStatus(records) {
      const values = Array.from(new Set(records.map((record) => String(record.status || "unreviewed"))));
      const labelMap = {
        unreviewed: "未校对",
        first_review: "一校中",
        second_review: "二校中",
        needs_extra_correction: "需额外校正",
        completed: "已完成",
      };
      if (values.length === 1) {
        const value = values[0];
        return {
          value,
          label: labelMap[value] || value,
          tone: value === "completed" ? "ok" : value === "needs_extra_correction" ? "warn" : "",
        };
      }
      return { value: "", label: "混合状态", tone: "warn" };
    }

    function handleCategoryClick(event) {
      const button = event.target.closest("[data-category-key]");
      if (!button) {
        return;
      }
      state.selectedCategoryKey = String(button.dataset.categoryKey || "");
      state.selectedBookKey = "";
      renderExplorer();
    }

    function handleBookClick(event) {
      const selectAll = event.target.closest("[data-select-all-books]");
      if (selectAll) {
        const category = visibleCategories().find((item) => item.key === state.selectedCategoryKey);
        const books = category?.books || [];
        if (selectAll.checked) {
          books.forEach((book) => state.selectedBookKeys.add(book.key));
        } else {
          books.forEach((book) => state.selectedBookKeys.delete(book.key));
        }
        renderExplorer();
        return;
      }
      const checkbox = event.target.closest("[data-book-select]");
      if (checkbox) {
        const key = String(checkbox.dataset.bookSelect || "");
        if (checkbox.checked) {
          state.selectedBookKeys.add(key);
        } else {
          state.selectedBookKeys.delete(key);
        }
        renderExplorer();
        return;
      }
      const bulkSelect = event.target.closest("[data-bulk-assignee]");
      if (bulkSelect) {
        state.bulkAssignee = String(bulkSelect.value || "");
        return;
      }
      const bulkStage = event.target.closest("[data-bulk-stage]");
      if (bulkStage) {
        state.bulkAssignStage = String(bulkStage.value || "first") === "second" ? "second" : "first";
        return;
      }
      const bulkButton = event.target.closest("[data-bulk-assign]");
      if (bulkButton) {
        assignSelectedBooks();
        return;
      }
      const button = event.target.closest("[data-book-key]");
      if (!button) {
        return;
      }
      state.selectedBookKey = String(button.dataset.bookKey || "");
      renderExplorer();
    }

    async function assignSelectedBooks() {
      if (!canAssign()) {
        setStatus(state.authenticated ? "只有管理员可以分配" : "请先登录管理员账号", true);
        return;
      }
      const assignee = String(document.querySelector("[data-bulk-assignee]")?.value || state.bulkAssignee || "").trim();
      const stage = String(document.querySelector("[data-bulk-stage]")?.value || state.bulkAssignStage || "first") === "second" ? "second" : "first";
      state.bulkAssignee = assignee;
      state.bulkAssignStage = stage;
      const categories = visibleCategories();
      const books = Array.from(state.selectedBookKeys).map((key) => findBookByKey(categories, key)).filter(Boolean);
      if (!books.length) {
        setStatus("请先勾选要分配的书籍", true);
        return;
      }
      if (stage === "second") {
        const missingFirstReviewer = books.find((book) => !firstReviewerForBook(book));
        if (missingFirstReviewer) {
          setStatus(`“${missingFirstReviewer.title}”还没有一校分配，不能直接分配二校`, true);
          return;
        }
      }
      state.savingBulkAssignment = true;
      applyLocalBookAssignments(books, (book) => assignmentForBookStage(book, stage, assignee));
      renderExplorer();
      setStatus(`正在批量分配 ${books.length} 本书的${stage === "second" ? "二校" : "一校"}...`);
      try {
        const overviewBooks = books.filter((book) => book.fromOssOverview);
        const dbBooks = books.filter((book) => !book.fromOssOverview);
        if (dbBooks.length) {
          await saveDbBookAssignments(dbBooks, null, { stage, assignee });
        }
        if (overviewBooks.length) {
          await saveOverviewBookAssignments(overviewBooks, null, { stage, assignee });
        }
        state.selectedBookKeys.clear();
        await refreshAssignmentData();
        setStatus(`已将 ${books.length} 本书的${stage === "second" ? "二校" : "一校"}分配给 ${assignee || "未分配"}`);
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        state.savingBulkAssignment = false;
        renderExplorer();
      }
    }

    async function handleFolderClick(event) {
      const secondStageButton = event.target.closest("[data-folder-second-stage]");
      if (secondStageButton) {
        if (!canAssign()) {
          setStatus(state.authenticated ? "只有管理员可以推进二校" : "请先登录管理员账号", true);
          return;
        }
        const confirmed = window.confirm("确认将这本书从一校转入二校？\n\n确认后，二校者将开始处理一校标记的“需要额外校正”内容。");
        if (!confirmed) {
          setStatus("已取消进入二校");
          return;
        }
        await enterSecondReview(String(secondStageButton.dataset.folderSecondStage || ""));
        return;
      }
    }

    async function saveOverviewBookAssignments(books, assignment, options = {}) {
      const assignments = books.map((book) => {
        const nextAssignment = assignment || assignmentForBookStage(book, options.stage, options.assignee);
        const firstReviewerId = String(nextAssignment?.firstReviewerId || "").trim();
        const secondReviewerId = String(nextAssignment?.secondReviewerId || "").trim();
        return {
          categoryTitle: book.categoryTitle || state.selectedCategoryKey,
          bookTitle: book.title,
          bookPrefix: book.bookPrefix || "",
          ownerUserId: secondReviewerId || firstReviewerId,
          firstReviewerId,
          secondReviewerId,
        };
      });
      const response = await fetch("/api/oss/book-assignments/bulk", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ assignments }),
      });
      const data = await readJsonResponse(response, "分配失败");
      if (!data.ok) {
        throw new Error(data.error || "分配失败");
      }
      (data.assignments || []).forEach((saved) => {
        updateOverviewBookAssignment(saved.category_title, saved.book_title, {
          ownerUserId: String(saved.owner_user_id || "").trim(),
          firstReviewerId: String(saved.first_reviewer_id || "").trim(),
          secondReviewerId: String(saved.second_reviewer_id || "").trim(),
        });
      });
      return data;
    }

    function updateOverviewBookAssignment(categoryTitle, bookTitle, assignment) {
      const firstReviewerId = String(assignment?.firstReviewerId || "").trim();
      const secondReviewerId = String(assignment?.secondReviewerId || "").trim();
      const ownerUserId = String(assignment?.ownerUserId || secondReviewerId || firstReviewerId || "").trim();
      const targetCategoryTitle = String(categoryTitle || "").trim();
      const targetBookTitle = String(bookTitle || "").trim();
      state.ossOverview = state.ossOverview.map((category) => {
        const title = String(category.title || "");
        if (title.trim() !== targetCategoryTitle) {
          return category;
        }
        return {
          ...category,
          books: (Array.isArray(category.books) ? category.books : []).map((book) => {
            const currentTitle = String(book.title || "");
            return currentTitle.trim() === targetBookTitle
              ? { ...book, owner_user_id: ownerUserId, first_reviewer_id: firstReviewerId, second_reviewer_id: secondReviewerId }
              : book;
          }),
        };
      });
    }

    async function enterSecondReview(folderKey) {
      const folder = findFolderByKey(visibleCategories(), folderKey);
      if (!folder) {
        setStatus("未找到目标文件夹", true);
        return;
      }
      const firstInfo = summarizeReviewer(folder.records, "first_reviewer_id", "owner_user_id");
      if (!firstInfo.value) {
        setStatus("请先分配一校，再进入二校", true);
        return;
      }
      const secondInfo = summarizeReviewer(folder.records, "second_reviewer_id");
      const assignment = { firstReviewerId: firstInfo.value, secondReviewerId: secondInfo.value };
      state.savingFolderKeys.add(folderKey);
      updateFolderAssignment(folder, assignment, "second_review");
      renderExplorer();
      setStatus(`正在进入二校：${folder.title}`);
      try {
        await saveDbBookAssignment({ folders: [folder], title: folder.title }, { ...assignment, status: "second_review" });
        await refreshAssignmentData();
        setStatus(`${folder.title} 已进入二校`);
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        state.savingFolderKeys.delete(folderKey);
        renderExplorer();
      }
    }

    async function saveDbBookAssignment(book, assignment) {
      return saveDbBookAssignments([book], assignment);
    }

    async function saveDbBookAssignments(books, assignment, options = {}) {
      const updates = [];
      for (const book of books) {
        const nextAssignment = assignment || assignmentForBookStage(book, options.stage, options.assignee);
        const firstReviewerId = String(nextAssignment?.firstReviewerId || "").trim();
        const secondReviewerId = String(nextAssignment?.secondReviewerId || "").trim();
        const requestedStatus = String(nextAssignment?.status || "").trim();
        const folders = Array.isArray(book.folders) ? book.folders : [];
        for (const folder of folders) {
          updateFolderAssignment(folder, { firstReviewerId, secondReviewerId }, requestedStatus);
          for (const record of folder.records || []) {
            const nextStatus = requestedStatus || nextStatusForAssignment(record.status, firstReviewerId, secondReviewerId);
            updates.push({
              bookId: String(record.id || ""),
              ownerUserId: secondReviewerId || firstReviewerId,
              firstReviewerId,
              secondReviewerId,
              status: nextStatus,
            });
          }
        }
      }
      if (!updates.length) {
        return;
      }
      const response = await fetch("/api/books/bulk-update", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates }),
      });
      const data = await readJsonResponse(response, "批量分配失败");
      if (!data.ok) {
        throw new Error(data.error || "批量分配失败");
      }
      (data.books || []).forEach((updated) => {
        state.books = state.books.map((item) => String(item.id || "") === String(updated.id || "") ? { ...item, ...updated } : item);
      });
    }

    async function refreshAssignmentData() {
      const response = await fetch("/api/books?limit=5000", { cache: "no-store", credentials: "include" });
      const data = await readJsonResponse(response, "书籍列表读取失败");
      if (!data.ok) {
        throw new Error(data.error || "书籍列表读取失败");
      }
      state.books = Array.isArray(data.books) ? data.books : [];
      state.syncRuns = Array.isArray(data.syncRuns) ? data.syncRuns : [];
      await loadOssOverview({ silent: true });
      ensureSelection();
      renderExplorer();
    }

    function nextStatusForAssignment(currentStatus, firstReviewerId, secondReviewerId) {
      const status = String(currentStatus || "unreviewed").trim() || "unreviewed";
      if (status === "completed" || status === "needs_extra_correction") {
        return status;
      }
      if (secondReviewerId) {
        return "second_review";
      }
      if (firstReviewerId) {
        return status === "second_review" ? "second_review" : "first_review";
      }
      return "unreviewed";
    }

    function updateFolderAssignment(folder, assignment, status = "") {
      const firstReviewerId = String(assignment?.firstReviewerId || "").trim();
      const secondReviewerId = String(assignment?.secondReviewerId || "").trim();
      const ownerUserId = secondReviewerId || firstReviewerId;
      const recordIds = new Set((folder.records || []).map((record) => String(record.id || "")));
      state.books = state.books.map((book) => recordIds.has(String(book.id || "")) ? {
        ...book,
        owner_user_id: ownerUserId,
        first_reviewer_id: firstReviewerId,
        second_reviewer_id: secondReviewerId,
        status: status || nextStatusForAssignment(book.status, firstReviewerId, secondReviewerId),
      } : book);
    }

    function assignmentForBookStage(book, stage, assignee) {
      const normalizedStage = String(stage || "first") === "second" ? "second" : "first";
      const assigneeId = String(assignee || "").trim();
      const firstReviewerId = normalizedStage === "second"
        ? firstReviewerForBook(book)
        : assigneeId;
      const secondReviewerId = normalizedStage === "second" ? assigneeId : "";
      return {
        firstReviewerId,
        secondReviewerId,
        status: normalizedStage === "second" ? "second_review" : "first_review",
      };
    }

    function firstReviewerForBook(book) {
      if (book.fromOssOverview) {
        return String(book.first_reviewer_id || book.owner_user_id || "").trim();
      }
      const records = bookRecords(book);
      return String(records.find((record) => record.first_reviewer_id || record.owner_user_id)?.first_reviewer_id || records.find((record) => record.owner_user_id)?.owner_user_id || "").trim();
    }

    function applyLocalBookAssignments(books, assignmentOrResolver) {
      books.forEach((book) => {
        const assignment = typeof assignmentOrResolver === "function" ? assignmentOrResolver(book) : assignmentOrResolver;
        if (book.fromOssOverview) {
          updateOverviewBookAssignment(book.categoryTitle || state.selectedCategoryKey, book.title, assignment);
        } else {
          (book.folders || []).forEach((folder) => updateFolderAssignment(folder, assignment));
        }
      });
    }

    function findFolderByKey(categories, folderKey) {
      for (const category of categories) {
        for (const book of category.books) {
          for (const folder of book.folders) {
            if (folder.key === folderKey) {
              return folder;
            }
          }
        }
      }
      return null;
    }

    function findBookByKey(categories, bookKey) {
      for (const category of categories) {
        for (const book of category.books) {
          if (book.key === bookKey) {
            return book;
          }
        }
      }
      return null;
    }

    function setBusy(busy, message = "") {
      els.syncOssButton.disabled = busy;
      els.syncAllCategoriesButton.disabled = busy || !canAssign();
      els.reloadButton.disabled = busy;
      els.syncCategorySelect.disabled = busy;
      els.searchInput.disabled = busy;
      els.loginButton.disabled = busy || state.authenticated;
      els.logoutButton.disabled = busy || !state.authenticated;
      els.loginPasswordInput.disabled = busy || state.authenticated;
      els.currentUserSelect.disabled = busy || state.authenticated;
      if (message) {
        setStatus(message);
      }
    }

    function setStatus(message, isError = false) {
      els.statusLine.textContent = message;
      els.statusLine.style.color = isError ? "#9c2d2d" : "";
    }

    async function readJsonResponse(response, fallbackMessage) {
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        const summary = text.trim().slice(0, 160) || `HTTP ${response.status}`;
        throw new Error(`${fallbackMessage}：${summary}`);
      }
      if (!response.ok) {
        throw new Error(data.error || `${fallbackMessage}：HTTP ${response.status}`);
      }
      return data;
    }

    function isGatewayInterruption(error) {
      const message = String(error?.message || error || "");
      return /Bad Gateway|HTTP 502|Gateway Timeout|HTTP 504|Failed to fetch|NetworkError/i.test(message);
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(String(value || ""));
      }
      return String(value || "").replace(/["\\]/g, "\\$&");
    }

  </script>
</body>
