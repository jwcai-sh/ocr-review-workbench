<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 三栏对照</title>
  <link rel="stylesheet" href="./ocr-compare.css?v=20260629-folder-upload">
</head>
<body>
  <div class="ocr-shell">
    <header class="ocr-header">
      <a class="back-link" href="./index.html" aria-label="返回智能体首页">←</a>
      <div>
        <h1>OCR 三栏对照</h1>
      </div>
      <form id="reviewerLoginForm" class="reviewer-session-pill" autocomplete="off">
        <span>用户</span>
        <select id="currentUserSelect" aria-label="当前用户"></select>
        <input id="loginPasswordInput" type="password" placeholder="口令" autocomplete="current-password">
        <button id="loginButton" type="submit">登录</button>
        <button id="logoutButton" type="button" disabled>退出</button>
      </form>
      <span id="reviewerAccessBadge" class="reviewer-access-badge">本地模式</span>
      <span id="statusBadge" class="status-badge">Ready</span>
    </header>

    <section class="control-band">
      <input id="pdfInput" class="hidden-input" type="file" accept=".pdf,application/pdf,image/*">
      <input id="mineruInput" class="hidden-input" type="file" accept=".json,application/json">
      <input id="contentListInput" class="hidden-input" type="file" accept=".json,application/json">
      <input id="requiredFilesInput" class="hidden-input" type="file" accept=".pdf,application/pdf,.json,application/json" multiple>
      <div class="control-column control-column-pdf" aria-label="上传 OCR 输入文件">
        <button id="pickRequiredFilesButton" class="primary-button upload-button upload-folder-button" type="button">
          <span class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3v12"></path>
              <path d="m7 8 5-5 5 5"></path>
              <path d="M5 15v4h14v-4"></path>
            </svg>
          </span>
          <span>上传本地文件夹</span>
        </button>
        <details class="manual-upload-panel">
          <summary class="secondary-button manual-upload-summary">手动选择</summary>
          <div class="manual-upload-actions" aria-label="手动上传 OCR 输入文件">
            <label id="pickPdfButton" class="secondary-button upload-button" for="pdfInput" role="button" tabindex="0">
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 3v12"></path>
                  <path d="m7 8 5-5 5 5"></path>
                  <path d="M5 15v4h14v-4"></path>
                </svg>
              </span>
              <span>PDF</span>
            </label>
            <label id="pickMineruButton" class="secondary-button upload-button" for="mineruInput" role="button" tabindex="0">
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 3v12"></path>
                  <path d="m7 8 5-5 5 5"></path>
                  <path d="M5 15v4h14v-4"></path>
                </svg>
              </span>
              <span>middle.json</span>
            </label>
            <label id="pickContentListButton" class="secondary-button upload-button" for="contentListInput" role="button" tabindex="0">
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 3v12"></path>
                  <path d="m7 8 5-5 5 5"></path>
                  <path d="M5 15v4h14v-4"></path>
                </svg>
              </span>
              <span>content_list</span>
            </label>
          </div>
        </details>
        <details class="oss-book-panel" aria-label="从 OSS 选择已有书籍">
          <summary class="secondary-button oss-book-summary">从 OSS 加载</summary>
          <div class="oss-book-picker">
            <button id="refreshOssBooksButton" class="secondary-button oss-book-button" type="button">刷新 OSS 书籍</button>
            <div id="ossBookBrowser" class="oss-book-browser" aria-label="选择 OSS 书籍或分块">
              <div class="oss-book-browser-column" aria-label="书籍目录">
                <div class="oss-book-browser-title">书籍</div>
                <div id="ossBookGroupList" class="oss-book-list" role="listbox" aria-label="OSS 书籍目录">
                  <div class="oss-book-empty">未加载 OSS 书籍</div>
                </div>
              </div>
              <div class="oss-book-browser-column" aria-label="分块列表">
                <div class="oss-book-browser-title">分块</div>
                <div id="ossBookEntryList" class="oss-book-list" role="listbox" aria-label="OSS 分块列表">
                  <div class="oss-book-empty">先选择左侧书籍</div>
                </div>
              </div>
            </div>
            <div id="ossBookSelectedSummary" class="oss-book-selected-summary">未选择 OSS 书籍</div>
            <button id="loadOssBookButton" class="primary-button oss-book-button" type="button" disabled>加载 OSS 书籍</button>
          </div>
        </details>
        <div class="accepted-top-actions" aria-label="accepted 校正稿操作">
          <button id="previewAcceptedBookButton" class="secondary-button accepted-action-button" type="button" data-preview-accepted-book-patches disabled hidden>
            预览整书 accepted 校正稿
          </button>
          <button id="downloadAcceptedCorrectedButton" class="secondary-button accepted-action-button" type="button" data-download-accepted-corrected disabled>
            下载 accepted 校正稿
          </button>
        </div>
      </div>
    </section>

    <main class="preview-panel">
      <div class="column-heads">
        <div>原文</div>
        <button class="column-resizer" type="button" data-resizer="left" aria-label="调整原文和 MinerU 栏宽"></button>
        <div>MinerU Markdown 预览</div>
        <button class="column-resizer" type="button" data-resizer="right" aria-label="调整 MinerU 和校对栏宽"></button>
        <div>校对工作台</div>
      </div>
      <section id="pageList" class="page-list">
        <div class="empty-state">选择原书 PDF，再选择对应的 MinerU `_middle.json`。优先点击高风险块，只对该块调用 Mathpix。</div>
      </section>
    </main>
  </div>

  <script src="./runtime-config.js"></script>
  <script>
    window.MathJax = {
      loader: {
        load: ["[tex]/boldsymbol"]
      },
      tex: {
        packages: { "[+]": ["boldsymbol"] },
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      },
      startup: {
        typeset: false,
        pageReady: () =>
          MathJax.startup.defaultPageReady().then(() => {
            window.dispatchEvent(new Event("mathjax-ready"));
          })
      }
    };
  </script>
  <script src="./ocr-compare.js?v=20260629-folder-upload"></script>
</body>
</html>
