<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 三栏对照</title>
  <link rel="stylesheet" href="./ocr-compare.css?v=20260628-science-inline-font">
</head>
<body>
  <div class="ocr-shell">
    <header class="ocr-header">
      <a class="back-link" href="./index.html" aria-label="返回智能体首页">←</a>
      <div>
        <h1>OCR 三栏对照</h1>
      </div>
      <span id="statusBadge" class="status-badge">Ready</span>
    </header>

    <section class="control-band">
      <div class="control-column control-column-pdf" aria-label="上传 OCR 输入文件">
        <label id="pickPdfButton" class="primary-button upload-button" role="button" tabindex="0">
          <input id="pdfInput" class="file-input-overlay" type="file" accept=".pdf,application/pdf,image/*" aria-label="上传 PDF">
          <span class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3v12"></path>
              <path d="m7 8 5-5 5 5"></path>
              <path d="M5 15v4h14v-4"></path>
            </svg>
          </span>
          <span>上传 PDF</span>
        </label>
        <label id="pickMineruButton" class="secondary-button upload-button" role="button" tabindex="0">
          <input id="mineruInput" class="file-input-overlay" type="file" accept=".json,application/json" aria-label="上传 middle.json">
          <span class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3v12"></path>
              <path d="m7 8 5-5 5 5"></path>
              <path d="M5 15v4h14v-4"></path>
            </svg>
          </span>
          <span>上传 middle.json</span>
        </label>
        <label id="pickContentListButton" class="secondary-button upload-button" role="button" tabindex="0">
          <input id="contentListInput" class="file-input-overlay" type="file" accept=".json,application/json" aria-label="上传 content_list">
          <span class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3v12"></path>
              <path d="m7 8 5-5 5 5"></path>
              <path d="M5 15v4h14v-4"></path>
            </svg>
          </span>
          <span>上传 content_list</span>
        </label>
        <label id="pickRequiredFilesButton" class="secondary-button upload-button upload-all-button" role="button" tabindex="0">
          <input id="requiredFilesInput" class="file-input-overlay" type="file" accept=".pdf,application/pdf,.json,application/json" multiple aria-label="一键上传所需文件">
          <span class="upload-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3v12"></path>
              <path d="m7 8 5-5 5 5"></path>
              <path d="M5 15v4h14v-4"></path>
            </svg>
          </span>
          <span>一键上传所需文件</span>
        </label>
        <div class="accepted-top-actions" aria-label="accepted 校正稿操作">
          <button id="previewAcceptedBookButton" class="secondary-button accepted-action-button" type="button" data-preview-accepted-book-patches disabled hidden>
            预览整书 accepted 校正稿
          </button>
          <button id="downloadAcceptedCorrectedButton" class="secondary-button accepted-action-button" type="button" data-download-accepted-corrected disabled>
            下载 accepted 校正稿
          </button>
        </div>
      </div>
    </section>

    <main class="preview-panel">
      <div class="column-heads">
        <div>原文</div>
        <button class="column-resizer" type="button" data-resizer="left" aria-label="调整原文和 MinerU 栏宽"></button>
        <div>MinerU Markdown 预览</div>
        <button class="column-resizer" type="button" data-resizer="right" aria-label="调整 MinerU 和校对栏宽"></button>
        <div>校对工作台</div>
      </div>
      <section id="pageList" class="page-list">
        <div class="empty-state">选择原书 PDF，再选择对应的 MinerU `_middle.json`。优先点击高风险块，只对该块调用 Mathpix。</div>
      </section>
    </main>
  </div>

  <script src="./runtime-config.js"></script>
  <script>
    window.MathJax = {
      loader: {
        paths: {
          mathjax: "./vendor/mathjax"
        },
        load: ["[tex]/boldsymbol"]
      },
      tex: {
        packages: { "[+]": ["boldsymbol"] },
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      },
      startup: {
        typeset: false,
        pageReady: () =>
          window.MathJax.startup.defaultPageReady().then(() => {
            window.dispatchEvent(new Event("mathjax-ready"));
          })
      }
    };
  </script>
  <script src="./ocr-compare.js?v=20260628-science-inline-font"></script>
</body>
</html>
